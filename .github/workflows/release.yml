name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to create, for example v0.1.0. Leave empty to only build artifacts.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build static binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${GOOS}-${GOARCH}
          go build \
            -trimpath \
            -ldflags='-s -w -extldflags "-static"' \
            -o dist/${GOOS}-${GOARCH}/garage-reconciler \
            ./
          tar -C dist/${GOOS}-${GOARCH} -czf dist/garage-reconciler-${GOOS}-${GOARCH}.tgz garage-reconciler
          sha256sum dist/garage-reconciler-${GOOS}-${GOARCH}.tgz > dist/garage-reconciler-${GOOS}-${GOARCH}.tgz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: garage-reconciler-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tgz
            dist/*.sha256

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    steps:
      - name: Resolve release tag
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eu

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${INPUT_RELEASE_TAG}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          case "${RELEASE_TAG}" in
            v*) ;;
            *)
              echo "release_tag must start with 'v' like v0.1.0. Got: ${RELEASE_TAG}" >&2
              exit 1
              ;;
          esac

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tgz
            dist/*.sha256
