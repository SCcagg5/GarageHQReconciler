name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build static binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${GOOS}-${GOARCH}
          go build \
            -trimpath \
            -ldflags='-s -w -extldflags "-static"' \
            -o dist/${GOOS}-${GOARCH}/garage-reconciler \
            ./
          tar -C dist/${GOOS}-${GOARCH} -czf dist/garage-reconciler-${GOOS}-${GOARCH}.tgz garage-reconciler
          sha256sum dist/garage-reconciler-${GOOS}-${GOARCH}.tgz > dist/garage-reconciler-${GOOS}-${GOARCH}.tgz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: garage-reconciler-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tgz
            dist/*.sha256

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tgz
            dist/*.sha256
